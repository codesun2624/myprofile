<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Profile Card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="profile-card">
        <div class="image-container">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSZs7tJkoLeUaeQxly43rIji4F46RUfAIfxahCOmH__Dg&s=10" alt="Profile Picture" class="profile-img">
        </div>
        
        <div class="text-data">
            <span class="name">Kartik patel</span>
            <span class="job">Frontend Developer</span>
        </div>

        <div class="skills">
            <span class="skill-badge">HTML</span>
            <span class="skill-badge">CSS</span>
            <span class="skill-badge">JavaScript</span>
        </div>

        <div class="media-buttons">
            <a href="https://github.com/codesun2624" class="link" style="background: #333;"><i class="fab fa-github"></i></a>
            <a href="https://www.linkedin.com/in/kartik-patel-922103371" class="link" style="background: #0077b5;"><i class="fab fa-linkedin"></i></a>
            <a href="#" class="link" style="background: #F77737;"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/qr/AW354TJAIA2YP1" class="link " style="background: #F77737;"><i class="fab fa-whatsapp"></i></a>

        </div>

        <div class="buttons">
            <button  class="btn message-btn">Message</button>
            <button class="btn hire-btn">Hire Me</button>
        </div>
    </div>

</body>
</html>
